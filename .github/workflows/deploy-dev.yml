name: Deploy to Development Server

on:
  workflow_dispatch:
  push:
    branches: [ "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Firebase directory
        run: mkdir -p src/main/resources/firebase

      - name: Write Firebase service key file
        id: create-json
        uses: jsdaniell/create-json@v1.2.2
        with:
          name: "stockpulse-firebase-service-key.json"
          json: ${{ secrets.FIREBASE_SERVICE_KEY }}
          dir: 'src/main/resources/firebase/'

      - name: Set application.yml
        run: |
          cd ./src/main/resources
          echo "${{ secrets.APPLICATION_YML }}" > ./application.yml
        shell: bash

      - name: Grant execute permission for gradle
        run: chmod +x ./gradlew
        shell: bash

      - name: Clean project
        run: ./gradlew clean
        shell: bash

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: build -x test

      - name: Rename build artifact to myapp.jar
        run: |
          mv $(ls ./build/libs/*.jar | head -n 1) ./build/libs/myapp.jar
        shell: bash

      - name: Prepare deploy folder
        run: |
          mkdir deploy
          cp build/libs/myapp.jar deploy/
          cp Dockerfile docker-compose.yml deploy/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: deploy/

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: deploy/

      - name: SCP files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/*"
          target: /home/${{ secrets.EC2_USERNAME }}/app/
          strip_components: 1

      - name: SSH deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USERNAME }}/app
            docker compose down --volumes
            docker image prune -f
            SPRING_PROFILES_ACTIVE=dev docker compose up --build -d