services:
  redis:
    image: redis:latest
    container_name: my_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  app:
    build: .
    container_name: stock_pulse
    ports:
      - "8080:8080"
    depends_on:
      - redis

volumes:
  redis_data: