services:
  redis:
    image: redis:latest
    container_name: my_redis
    ports:
      - "6379:6379"
  app:
    build: .
    container_name: stock_pulse
    ports:
      - "8080:8080"
    depends_on:
      - redis
    environment:
      - KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID}
      - KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET}
      - KAKAO_REDIRECT_URI=${KAKAO_REDIRECT_URI}